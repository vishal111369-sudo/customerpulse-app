<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomerPulse</title>
<!--
  CustomerPulse — domain-agnostic customer-intelligence app (PlayerPulse model, generalised).
  One core + a vertical config. Onboarding picks industry + business name, which relabels the
  canonical Customer Profile schema across the whole UI and swaps the AI knowledge pack.
  Verticals: B2B SaaS · Retail/E-com · Finance (brokerage/trading CRM) · Sandbox (generic demo).
  Ingestion: plugin handoff (?customer=<b64>), plus seeded demo data. (c) 2026 Equibyte Technologies.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0f1117;--surface:#161b27;--surface2:#1c2235;--surface3:#212840;--border:#252d42;--border2:#2e3854;
    --text:#d4e0f5;--text2:#8fa8cc;--muted:#4a607a;--accent:#4f8dff;--green:#00c076;--red:#e8304a;--gold:#ffd740;
    --purple:#b47fff;--cyan:#00e5ff;--radius:10px;--mono:'SF Mono','Fira Code','Courier New',monospace;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  .mono{font-family:var(--mono)}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand .dot{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center}
  .brand small{font-weight:500;color:var(--text2);font-size:12.5px;margin-left:6px}
  .navtabs{display:flex;gap:6px}
  .navtabs .t{padding:7px 15px;border-radius:20px;cursor:pointer;color:var(--text2);font-weight:600;font-size:13.5px}
  .navtabs .t.active{background:var(--surface3);color:var(--text)}
  .navr{display:flex;align-items:center;gap:12px;color:var(--text2);font-size:13px}
  .navr .chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer}
  .wrap{max-width:1180px;margin:0 auto;padding:22px}
  .overlay{position:fixed;inset:0;background:rgba(8,10,16,.86);display:grid;place-items:center;z-index:50}
  .ob{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:34px;width:600px;max-width:92vw}
  .ob h1{font-size:24px;margin-bottom:6px} .ob p{color:var(--text2);margin-bottom:22px;font-size:14px}
  .ob label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin:16px 0 8px}
  .verticals{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .vopt{border:1px solid var(--border2);border-radius:10px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:.15s}
  .vopt .ic{font-size:22px} .vopt .nm{font-weight:700;font-size:14px} .vopt .ds{font-size:11.5px;color:var(--muted)}
  .vopt.sel{border-color:var(--accent);background:var(--surface3)}
  .ob input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:12px 14px;color:var(--text);font-size:15px}
  .ob .go{margin-top:24px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer}
  .ob .go:disabled{opacity:.4;cursor:not-allowed}
  .section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  h2{font-size:18px} .sub{color:var(--text2);font-size:13px}
  .search{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:9px 13px;color:var(--text);font-size:14px;width:260px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-top:16px}
  .ccard{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:15px;cursor:pointer;transition:.15s}
  .ccard:hover{border-color:var(--accent)}
  .ccard .cn{font-weight:700;font-size:15px} .ccard .ci{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .ccard .cm{margin-top:10px;font-size:22px;font-weight:800;font-family:var(--mono)}
  .ccard .cl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;cursor:default}
  .tag.click{cursor:pointer}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
  .kpi{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}
  .kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
  .kpi .v{font-size:20px;font-weight:800;margin-top:5px;font-family:var(--mono)}
  .ptabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:4px 0 16px;flex-wrap:wrap}
  .ptabs .pt{padding:9px 14px;cursor:pointer;font-weight:600;font-size:13.5px;color:var(--text2);border-bottom:2px solid transparent}
  .ptabs .pt.active{color:var(--accent);border-bottom-color:var(--accent)}
  .kvcols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .kv{width:100%;border-collapse:collapse}
  .kv th{text-align:left;padding:8px 0;color:var(--text2);font-weight:500;font-size:13.5px;border-bottom:1px solid var(--border)}
  .kv td{text-align:right;padding:8px 0;font-weight:600;font-family:var(--mono);font-size:13.5px;border-bottom:1px solid var(--border)}
  table.tx{width:100%;border-collapse:collapse;margin-top:4px}
  table.tx th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding:8px;border-bottom:1px solid var(--border)}
  table.tx td{padding:8px;border-bottom:1px solid var(--border);font-size:13px;font-family:var(--mono)}
  .btn{background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:9px 15px;font-weight:600;cursor:pointer;font-size:13.5px}
  .btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .pill{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px}
  .pill.high{background:rgba(232,48,74,.15);color:var(--red)} .pill.mid{background:rgba(255,215,64,.15);color:var(--gold)} .pill.low{background:rgba(0,192,118,.15);color:var(--green)}
  .ai{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px;white-space:pre-wrap;font-size:14px;line-height:1.65}
  .chartwrap{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:8px}
  .chartbox{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
  .chartbox .ct{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  canvas{width:100%;display:block}
  .actlog .item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
  .actlog .item .ty{font-weight:700;min-width:110px}
  .actlog .item .nt{color:var(--text2);flex:1}
  .actlog .item .dt{color:var(--muted);font-size:12px;font-family:var(--mono)}
  select,textarea{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:9px 11px;font-size:13.5px;font-family:var(--font)}
  textarea{width:100%;min-height:120px;resize:vertical}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .modal-bg{position:fixed;inset:0;background:rgba(8,10,16,.7);display:none;place-items:center;z-index:60}
  .modal-bg.show{display:grid}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:26px;width:440px;max-width:92vw}
  .modal label{display:block;font-size:12px;color:var(--text2);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .modal input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px;color:var(--text);font-size:14px}
  .back{color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:10px;display:inline-block}
</style>
</head>
<body>
<div id="onboarding"></div>

<div class="nav" id="nav" style="display:none">
  <div class="brand"><span class="dot">◉</span> CustomerPulse <small id="bizlabel"></small></div>
  <div class="navtabs">
    <div class="t active" data-view="dashboard">Dashboard</div>
    <div class="t" data-view="analyze">Add / Analyze</div>
  </div>
  <div class="navr">
    <span id="modeChip" style="font-size:12px;font-weight:700"></span>
    <span class="chip" id="verticalChip"></span>
    <span class="chip" onclick="openSettings()">⚙ Settings</span>
    <span class="chip" onclick="logout()">Logout</span>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label>Your name (analyst / manager)</label>
    <input id="setCsm" placeholder="e.g. Priya N.">
    <label>Gemini API key (stored only in this browser)</label>
    <input id="setKey" type="password" placeholder="AI…">
    <label>Live data — CustomerPulse API key (optional)</label>
    <input id="setApi" type="password" placeholder="cp_live_… (leave blank for demo data)">
    <label>Change domain / organisation / sandbox</label>
    <button class="btn" style="margin-top:6px" onclick="reOnboard()">Change workspace ↻</button>
    <div style="display:flex;gap:10px;margin-top:22px">
      <button class="btn p" style="flex:1" onclick="saveSettings()">Save</button>
      <button class="btn" onclick="closeSettings()">Close</button>
    </div>
  </div>
</div>

<script>
/* ============ VERTICAL CONFIGS (the only thing that swaps) ============ */
const VERTICALS = {
  "b2b-saas": {
    label:"B2B SaaS", icon:"☁", desc:"Customer Success", placeholder:"e.g. Northwind Software",
    entity:"Account", entities:"Accounts", owner:"CSM", currency:"USD",
    labels:{ recurring_value:"ARR", primary_spend:"Lifetime Value", pending:"Outstanding Balance",
      refunds:"Refunds / Credits", promo_value:"Credits", net_value:"Net Revenue", avg_unit:"Avg Deal Size",
      sessions_30d:"Logins (30d)", units_used:"Active Seats", renewal_date:"Renewal Date",
      risk_level:"Churn Risk", health_score:"Health Score", segment:"Segment", nps:"NPS" },
    kpis:["net_value","recurring_value","health_score","renewal_date"],
    seriesLabel:{net:"Net revenue trajectory", spend:"Monthly invoices"},
    actions:["Call","Email","QBR","Renewal outreach","Expansion offer","Escalate","Note"],
    tagColors:{Champion:"#00c076",Expansion:"#4f8dff","At-Risk":"#e8304a","Renewal Due":"#ffd740",Onboarding:"#b47fff",Steady:"#8fa8cc",Watch:"#00e5ff"},
    kb:{ role:"You are a senior B2B SaaS Customer Success analyst.",
      guidance:"Classify the account (Champion / Expansion-ready / Steady / At-Risk / Churn-Risk / Onboarding). Flag churn signals: declining logins, low seat adoption vs purchased, rising/unresolved tickets, failed or late payments, sponsor departure, renewal approaching. Two+ co-occurring = material churn risk → recommend a save play, not an upsell. Seat utilisation is the strongest adoption signal." } },
  "retail": {
    label:"Retail / E-com", icon:"🛍", desc:"Shopper CRM", placeholder:"e.g. Harbor Goods",
    entity:"Customer", entities:"Customers", owner:"Account Manager", currency:"USD",
    labels:{ recurring_value:"Avg Monthly Spend", primary_spend:"Lifetime Spend", pending:"Open Returns Value",
      refunds:"Refunds", promo_value:"Loyalty / Discounts", net_value:"Net Revenue", avg_unit:"Avg Order Value",
      sessions_30d:"Visits (30d)", units_used:"Orders (90d)", renewal_date:"Next Best Contact",
      risk_level:"Churn Risk", health_score:"Loyalty Score", segment:"Segment", nps:"NPS" },
    kpis:["primary_spend","recurring_value","health_score","risk_level"],
    seriesLabel:{net:"Spend trajectory", spend:"Order value"},
    actions:["Call","Email","SMS","Win-back offer","Loyalty upgrade","Replenishment nudge","Note"],
    tagColors:{VIP:"#ffd740",Loyal:"#00c076","At-Risk":"#e8304a","Win-back":"#00e5ff",New:"#b47fff","Discount-led":"#ff8fa3",Watch:"#ffb347"},
    kb:{ role:"You are a senior retail / e-commerce CRM and lifecycle analyst.",
      guidance:"Segment by RFM (recency, frequency, monetary). Flag: lapsing (no recent orders vs cadence), discount-dependence (high promo share of spend), high return rate eroding net revenue. High LTV + recent + frequent = VIP nurture. Recommend: win-back offer, loyalty upgrade, replenishment nudge, or VIP treatment." } },
  "finance": {
    label:"Finance / Trading", icon:"📈", desc:"Brokerage CRM", placeholder:"e.g. Meridian Markets",
    entity:"Client", entities:"Clients", owner:"Relationship Manager", currency:"USD",
    labels:{ recurring_value:"Avg Monthly Volume", primary_spend:"Assets Under Management", pending:"Pending Withdrawals",
      refunds:"Fee Reversals", promo_value:"Credits / Rebates", net_value:"Commission Revenue", avg_unit:"Avg Trade Size",
      sessions_30d:"Trades (30d)", units_used:"Open Positions", renewal_date:"Next Review",
      risk_level:"Attrition Risk", health_score:"Engagement Score", segment:"Tier", nps:"NPS" },
    kpis:["primary_spend","net_value","health_score","risk_level"],
    seriesLabel:{net:"Commission revenue trajectory", spend:"Trading volume"},
    actions:["Call","Email","Portfolio review","Re-activation","Fee review","Retention offer","Note"],
    tagColors:{HNW:"#ffd740","Active Trader":"#00c076",Dormant:"#e8304a","At-Risk":"#4f8dff",New:"#b47fff",Margin:"#ff8fa3",Watch:"#00e5ff"},
    kb:{ role:"You are a senior brokerage / trading-platform CRM analyst focused on client relationship health.",
      guidance:"Assess engagement and attrition risk from behaviour: declining trade frequency, net withdrawals, dormancy, falling AUM, or margin/leverage exposure. HNW + active = retain/nurture. IMPORTANT: this is relationship-health analysis, NOT investment advice — never recommend buying/selling securities or predict markets. Recommend a relationship action only: RM outreach, re-activation campaign, fee review, or retention offer." } },
};
const MONEY_KEYS=["recurring_value","primary_spend","net_value","avg_unit","promo_value","refunds","pending"];
const ACTIVITY_KEYS=["sessions_30d","units_used","renewal_date"];
const RISK_KEYS=["health_score","risk_level","segment","nps"];

/* ============ STATE ============ */
let SETUP=JSON.parse(localStorage.getItem("cp_setup")||"null");
let CSM=localStorage.getItem("cp_csm")||"";
let GKEY=localStorage.getItem("cp_gemini_key")||"";
let APIKEY=localStorage.getItem("cp_api_key")||"";
const CP_API="https://sufuqnqmcvdrxnbfmpwh.supabase.co/functions/v1";
const CP_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1ZnVxbnFtY3ZkcnhuYmZtcHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODYyNDcsImV4cCI6MjA5Njc2MjI0N30.QcCeSrYA0AD8tSslC3XjiLfRp-dkr_-DSBsDArTAz4E";
const SB_URL="https://sufuqnqmcvdrxnbfmpwh.supabase.co";
const SBC=window.supabase.createClient(SB_URL,CP_ANON);
let USER=null;
let MODE="demo";
let CUSTOMERS=[], CURRENT=null, obSel=null, PTAB="Overview", QUERY="";
async function pullLive(){ if(!APIKEY) return null;
  try{ const r=await fetch(CP_API+"/cp-pull",{method:"POST",headers:{"Authorization":"Bearer "+CP_ANON,"x-api-key":APIKEY,"Content-Type":"application/json"},body:"{}"});
    const j=await r.json(); return (j&&Array.isArray(j.customers))?j:null; }catch(e){ return null; } }
const $=s=>document.querySelector(s);
function V(){ return VERTICALS[SETUP.vertical]; }
function label(k){ return V().labels[k]||k; }

/* seeded RNG + daily series for charts */
function seeded(s){ return ()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }; }
function genDaily(seed,trend){ const r=seeded(seed); let net=0; const out=[];
  for(let i=0;i<30;i++){ const base=trend*45+(r()-0.45)*260; net+=base;
    out.push({d:i,spend:Math.max(20,Math.round(160+(r()-0.3)*380)),net:Math.round(net)}); } return out; }

/* ============ AUTH + DOMAIN SIGN-IN ============ */
let obSandbox=false;
function domainTiles(){ return Object.entries(VERTICALS).map(([id,v])=>
  `<div class="vopt ${obSel===id?'sel':''}" data-id="${id}" onclick="selVertical('${id}')">
    <div class="ic">${v.icon}</div><div><div class="nm">${v.label}</div><div class="ds">${v.desc}</div></div></div>`).join(""); }
function renderAuth(mode){
  const setup = mode==='setup';   // already authed → just choose domain / org
  $("#onboarding").innerHTML=`<div class="overlay"><div class="ob">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-weight:800">◉</span>
      <h1 style="font-size:22px;margin:0">CustomerPulse</h1></div>
    <p>${setup?'Choose your domain and name your organisation to open your workspace.':'Customer intelligence, tuned to your world — sign in to continue.'}</p>
    ${setup?'':`
      <label>Email</label><input id="auEmail" type="email" placeholder="you@company.com">
      <label>Password</label><input id="auPass" type="password" placeholder="••••••••">`}
    <label>Organisation</label><input id="obBiz" placeholder="e.g. Meridian Markets" oninput="obCheck()">
    <label>Domain</label><div class="verticals">${domainTiles()}</div>
    <label style="display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:0;font-size:13.5px;color:var(--text);cursor:pointer;margin-top:16px">
      <input type="checkbox" id="obSandbox" ${obSandbox?'checked':''} onchange="obSandbox=this.checked" style="width:auto;accent-color:var(--accent)">
      Use Sandbox — explore this domain with seeded sample data (test workspace)</label>
    <div id="auMsg"></div>
    ${setup?
      `<button class="go" id="obGo" ${obSel?'':'disabled'} onclick="saveWorkspace()">Open workspace →</button>`:
      `<div style="display:flex;gap:10px;margin-top:20px">
        <button class="go" style="margin:0;flex:1" onclick="signIn()">Sign in</button>
        <button class="go" style="margin:0;flex:1;background:var(--surface3);color:var(--text);border:1px solid var(--border2)" onclick="signUp()">Create account</button></div>
      <div style="color:var(--muted);font-size:12px;margin-top:12px;text-align:center">Organisation &amp; domain are required to create an account. Data is isolated per organisation.</div>`}
  </div></div>`;
  $("#onboarding").style.display="block";
}
function selVertical(id){ obSel=id; document.querySelectorAll(".vopt").forEach(e=>e.classList.toggle("sel",e.dataset.id===id));
  const b=$("#obBiz"); if(b&&!b.value) b.placeholder=VERTICALS[id].placeholder; obCheck(); }
function obCheck(){ const g=$("#obGo"); if(g) g.disabled=!(obSel && $("#obBiz").value.trim()); }
function amsg(t,ok){ const e=$("#auMsg"); if(!e) return; e.textContent=t;
  e.style.cssText="margin-top:14px;font-size:13px;padding:9px 11px;border-radius:8px;"+(ok?"background:rgba(0,192,118,.12);color:var(--green)":"background:rgba(232,48,74,.14);color:var(--red)"); }

async function signIn(){
  const email=$("#auEmail").value.trim(), pass=$("#auPass").value;
  if(!email||!pass){ amsg("Enter your email and password.",false); return; }
  amsg("Signing in…",true);
  const {data,error}=await SBC.auth.signInWithPassword({email,password:pass});
  if(error){ amsg(error.message,false); return; }
  USER=data.user; await afterAuth();
}
async function signUp(){
  const email=$("#auEmail").value.trim(), pass=$("#auPass").value, biz=$("#obBiz").value.trim();
  if(!email||!pass){ amsg("Enter your email and password.",false); return; }
  if(!obSel||!biz){ amsg("Pick a domain and enter your organisation to create an account.",false); return; }
  amsg("Creating account…",true);
  const {data,error}=await SBC.auth.signUp({email,password:pass,options:{emailRedirectTo:location.origin,data:{vertical:obSel,business:biz}}});
  if(error){ amsg(error.message,false); return; }
  if(data.session){ USER=data.user; await afterAuth(); }
  else amsg("Account created — check your email to confirm, then sign in.",true);
}
async function afterAuth(){
  const md=USER.user_metadata||{};
  if(!CSM){ CSM=md.name||USER.email; localStorage.setItem("cp_csm",CSM); }
  const formBiz=$("#obBiz")?$("#obBiz").value.trim():"";
  const vertical=(obSel&&VERTICALS[obSel])?obSel:(VERTICALS[md.vertical]?md.vertical:null);
  const business=formBiz||md.business;
  if(vertical&&business){ await saveWorkspace(vertical,business); }
  else renderAuth('setup');
}
async function saveWorkspace(vertical,business){
  vertical=vertical||obSel; business=business||($("#obBiz")?$("#obBiz").value.trim():"");
  if(!vertical||!VERTICALS[vertical]||!business){ amsg("Pick a domain and enter your organisation.",false); return; }
  const sandbox = $("#obSandbox") ? $("#obSandbox").checked : !!obSandbox;
  SETUP={vertical,business,sandbox};
  localStorage.setItem("cp_setup",JSON.stringify(SETUP));
  try{ await SBC.auth.updateUser({data:{vertical,business}}); }catch(e){}
  $("#onboarding").style.display="none"; boot();
}
async function logout(){ try{ await SBC.auth.signOut(); }catch(e){} localStorage.removeItem("cp_setup"); location.reload(); }
function reOnboard(){ closeSettings(); obSel=SETUP?SETUP.vertical:null; obSandbox=SETUP?!!SETUP.sandbox:false; renderAuth('setup'); }

/* ============ INGESTION ============ */
function loadFromParam(){ const p=new URLSearchParams(location.search).get("customer"); if(!p) return null;
  try{ return normalize(JSON.parse(decodeURIComponent(escape(atob(p))))); }catch(e){ return null; } }
function normalize(d){ const c=(d.entity||d.money)?{entity:d.entity||{},money:d.money||{},activity:d.activity||{},risk:d.risk||{},tags:d.tags||[],transactions:d.transactions||[]}:d;
  c.daily=c.daily||genDaily(7,0); c.actions=c.actions||[]; c.note=c.note||""; return c; }

function riskCls(r){ r=(r||"").toLowerCase(); return r.includes("high")?"high":(r.includes("med")||r.includes("mid"))?"mid":"low"; }
function tagColor(t){ return V().tagColors[t]||"#8fa8cc"; }
function tagHTML(tags,click){ return `<div class="tags">${(tags||[]).map(t=>`<span class="tag ${click?'click':''}" ${click?`onclick="toggleTag('${t}')"`:''} style="background:${tagColor(t)}22;color:${tagColor(t)}">${t}</span>`).join("")}</div>`; }
function firstVal(c,k){ return c.money[k]??c.risk[k]??c.activity[k]??"—"; }

function showView(name){ document.querySelectorAll(".navtabs .t").forEach(t=>t.classList.toggle("active",t.dataset.view===name));
  if(name==="dashboard") renderDashboard(); else renderAnalyze(); }
function renderDashboard(){
  const v=V(); const q=QUERY.toLowerCase();
  const list=CUSTOMERS.filter(c=>!q||c.entity.name.toLowerCase().includes(q)||(c.entity.entity_id||"").toLowerCase().includes(q));
  const cards=list.map((c)=>{ const gi=CUSTOMERS.indexOf(c); const key=v.kpis[0];
    return `<div class="ccard" onclick="openCustomer(${gi})">
      <div class="row"><div><div class="cn">${c.entity.name}</div><div class="ci">${c.entity.entity_id||""}</div></div>
      <span class="pill ${riskCls(c.risk.risk_level)}">${c.risk.risk_level||"—"}</span></div>
      <div class="cl">${label(key)}</div><div class="cm">${firstVal(c,key)}</div>${tagHTML(c.tags)}</div>`; }).join("");
  $("#app").innerHTML=`<div class="section-card"><div class="row">
    <div><h2>${v.entities}</h2><div class="sub">${CUSTOMERS.length} ${v.entities.toLowerCase()} · ${SETUP.business}</div></div>
    <input class="search" placeholder="Search ${v.entities.toLowerCase()}…" value="${QUERY}" oninput="QUERY=this.value;renderDashboard();this.focus?.()">
    </div>${list.length?`<div class="grid">${cards}</div>`:(CUSTOMERS.length===0?`<div class="empty">No ${v.entities.toLowerCase()} yet.<br>Push data via the ingestion API / browser plugin, add your API key in ⚙ Settings, or tick <b>Use Sandbox</b> at sign-in to explore with sample data.</div>`:`<div class="empty">No matches.</div>`)}</div>`;

function toggleTag(t){ const s=new Set(CURRENT.tags); s.has(t)?s.delete(t):s.add(t); CURRENT.tags=[...s]; renderProfile(); }

/* ============ CHARTS (canvas 2D, DPR-aware) ============ */
function setupCanvas(cv){ const DPR=window.devicePixelRatio||1; const w=cv.clientWidth||520, h=cv.height;
  cv.width=w*DPR; cv.height=h*DPR; const ctx=cv.getContext("2d"); if(!ctx) return null; ctx.scale(DPR,DPR); return {ctx,w,h}; }
function drawCharts(){ const c=CURRENT; if(!c||!c.daily) return;
  const a=$("#chA"), b=$("#chB"); if(!a||!a.getContext) return;
  if(!a.getContext("2d")) return;
  // A: cumulative net line + area
  const A=setupCanvas(a); if(!A) return; const {ctx,w,h}=A; const nets=c.daily.map(d=>d.net);
  const mn=Math.min(0,...nets), mx=Math.max(0,...nets), pad=8, span=(mx-mn)||1;
  const X=i=>pad+i*(w-2*pad)/(c.daily.length-1), Y=val=>h-pad-(val-mn)*(h-2*pad)/span;
  ctx.strokeStyle="rgba(255,255,255,.08)"; ctx.beginPath(); ctx.moveTo(pad,Y(0)); ctx.lineTo(w-pad,Y(0)); ctx.stroke();
  ctx.beginPath(); c.daily.forEach((d,i)=>i?ctx.lineTo(X(i),Y(d.net)):ctx.moveTo(X(i),Y(d.net)));
  ctx.lineTo(X(c.daily.length-1),Y(0)); ctx.lineTo(X(0),Y(0)); ctx.closePath();
  ctx.fillStyle="rgba(0,192,118,.14)"; ctx.fill();
  ctx.beginPath(); c.daily.forEach((d,i)=>i?ctx.lineTo(X(i),Y(d.net)):ctx.moveTo(X(i),Y(d.net)));
  ctx.strokeStyle="#00c076"; ctx.lineWidth=2; ctx.stroke();
  // B: spend bars
  const s=setupCanvas(b); if(!s) return; const sp=c.daily.map(d=>d.spend), smx=Math.max(...sp)||1, bw=(s.w-16)/c.daily.length;
  c.daily.forEach((d,i)=>{ const bh=(d.spend/smx)*(s.h-16); s.ctx.fillStyle="rgba(79,141,255,.7)";
    s.ctx.fillRect(8+i*bw,s.h-8-bh,Math.max(1,bw-1.5),bh); });
}

async function runAI(){ const c=CURRENT, v=V(), out=$("#aiOut"), btn=$("#aiBtn"); out.style.display="block";
  if(!GKEY){ out.textContent="Add your Gemini API key in ⚙ Settings to generate an AI review."; return; }
  btn.disabled=true; out.textContent="Analysing…";
  const facts=`${v.entity}: ${c.entity.name} (${c.entity.entity_id||""})
Value: ${JSON.stringify(c.money)}
Activity: ${JSON.stringify(c.activity)}
Risk: ${JSON.stringify(c.risk)}
Tags: ${(c.tags||[]).join(", ")}
Recent transactions: ${JSON.stringify(c.transactions||[])}`;
  const prompt=`${v.kb.role}\n${v.kb.guidance}\n\nHere is one ${v.entity.toLowerCase()} from ${SETUP.business} (${v.label}). Field names use ${v.label} terminology. Write a concise 3-4 sentence brief for the ${v.owner}: read the pattern between the numbers, name the archetype, flag any risk, and recommend one specific next action. Do not restate the raw numbers.\n\n${facts}`;
  try{ const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GKEY}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.4,maxOutputTokens:400}})});
    const j=await r.json(); out.textContent=j?.candidates?.[0]?.content?.parts?.[0]?.text||("No response. "+(j?.error?.message||""));
  }catch(e){ out.textContent="Error: "+e.message; } btn.disabled=false;
}

/* ============ SETTINGS ============ */
function openSettings(){ $("#setCsm").value=CSM; $("#setKey").value=GKEY; $("#setApi").value=APIKEY; $("#settingsModal").classList.add("show"); }
function closeSettings(){ $("#settingsModal").classList.remove("show"); }
function saveSettings(){ CSM=$("#setCsm").value.trim(); GKEY=$("#setKey").value.trim(); const newApi=$("#setApi").value.trim();
  localStorage.setItem("cp_csm",CSM); localStorage.setItem("cp_gemini_key",GKEY);
  const changed=newApi!==APIKEY; APIKEY=newApi; localStorage.setItem("cp_api_key",APIKEY); closeSettings();
  if(changed) boot(); }

/* ============ BOOT ============ */
async function boot(){ const v=V();
  $("#nav").style.display="flex"; $("#app").style.display="block";
  $("#bizlabel").textContent="· "+SETUP.business; $("#verticalChip").textContent=v.icon+" "+v.label;
  document.querySelectorAll(".navtabs .t").forEach(t=>t.onclick=()=>showView(t.dataset.view));
  const fromPlugin=loadFromParam();
  if(SETUP.sandbox){ MODE="sandbox"; CUSTOMERS=demoData(); }
  else { const live=await pullLive(); if(live && live.customers.length){ MODE="live"; CUSTOMERS=live.customers.map(normalize); } else { MODE="empty"; CUSTOMERS=[]; } }
  $("#modeChip").textContent = MODE==="sandbox"?"🧪 Sandbox" : MODE==="live"?"● Live" : "◦ No data yet";
  $("#modeChip").style.color = MODE==="live"?"var(--green)" : MODE==="sandbox"?"var(--gold)" : "var(--text2)";
  if(fromPlugin){ CUSTOMERS.unshift(fromPlugin); CURRENT=fromPlugin; PTAB="Overview"; renderProfile(); }
  else showView("dashboard");
}
window.addEventListener("resize",()=>{ if(CURRENT&&PTAB==="Overview"&&$("#chA")) drawCharts(); });
SBC.auth.onAuthStateChange((e,session)=>{ if(e==="SIGNED_IN" && session && !USER){ USER=session.user; afterAuth(); } });
(async()=>{
  try{ const { data:{ session } } = await SBC.auth.getSession();
    if(session){ USER=session.user; await afterAuth(); return; } }catch(e){}
  renderAuth('full');
})();
</script>
