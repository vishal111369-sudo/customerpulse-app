<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomerPulse</title>
<!--
  CustomerPulse — domain-agnostic customer-intelligence app.
  One core + a vertical config. Onboarding picks the industry + business name,
  which relabels the canonical Customer Profile schema across the whole UI and
  swaps the AI knowledge pack. Ingestion: plugin handoff (?customer=<b64>), CSV,
  or demo data. (c) 2026 Equibyte Technologies.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0f1117;--surface:#161b27;--surface2:#1c2235;--surface3:#212840;--border:#252d42;--border2:#2e3854;
    --text:#d4e0f5;--text2:#8fa8cc;--muted:#4a607a;--accent:#4f8dff;--green:#00c076;--red:#e8304a;--gold:#ffd740;
    --purple:#b47fff;--cyan:#00e5ff;--radius:10px;--mono:'SF Mono','Fira Code','Courier New',monospace;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  .mono{font-family:var(--mono)}
  /* top nav */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--surface)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand .dot{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center}
  .brand small{font-weight:500;color:var(--text2);font-size:12.5px;margin-left:6px}
  .navtabs{display:flex;gap:6px}
  .navtabs .t{padding:7px 15px;border-radius:20px;cursor:pointer;color:var(--text2);font-weight:600;font-size:13.5px}
  .navtabs .t.active{background:var(--surface3);color:var(--text)}
  .navr{display:flex;align-items:center;gap:14px;color:var(--text2);font-size:13px}
  .navr .chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer}
  .wrap{max-width:1200px;margin:0 auto;padding:22px}
  /* onboarding */
  .overlay{position:fixed;inset:0;background:rgba(8,10,16,.86);display:grid;place-items:center;z-index:50}
  .ob{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:34px;width:560px;max-width:92vw}
  .ob h1{font-size:24px;margin-bottom:6px} .ob p{color:var(--text2);margin-bottom:22px;font-size:14px}
  .ob label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin:16px 0 8px}
  .verticals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .vopt{border:1px solid var(--border2);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:.15s}
  .vopt .ic{font-size:22px} .vopt .nm{font-weight:700;margin-top:6px;font-size:14px} .vopt .ds{font-size:11.5px;color:var(--muted);margin-top:3px}
  .vopt.sel{border-color:var(--accent);background:var(--surface3)}
  .ob input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:12px 14px;color:var(--text);font-size:15px}
  .ob .go{margin-top:24px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer}
  .ob .go:disabled{opacity:.4;cursor:not-allowed}
  /* cards & grid */
  .section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  h2{font-size:18px} .sub{color:var(--text2);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
  .ccard{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:15px;cursor:pointer;transition:.15s}
  .ccard:hover{border-color:var(--accent)}
  .ccard .cn{font-weight:700;font-size:15px} .ccard .ci{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .ccard .cm{margin-top:10px;font-size:22px;font-weight:800;font-family:var(--mono)}
  .ccard .cl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
  .kpi{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}
  .kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
  .kpi .v{font-size:21px;font-weight:800;margin-top:5px;font-family:var(--mono)}
  .kvcols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .kv{width:100%;border-collapse:collapse}
  .kv th{text-align:left;padding:8px 0;color:var(--text2);font-weight:500;font-size:13.5px;border-bottom:1px solid var(--border)}
  .kv td{text-align:right;padding:8px 0;font-weight:600;font-family:var(--mono);font-size:13.5px;border-bottom:1px solid var(--border)}
  table.tx{width:100%;border-collapse:collapse;margin-top:8px}
  table.tx th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding:8px;border-bottom:1px solid var(--border)}
  table.tx td{padding:8px;border-bottom:1px solid var(--border);font-size:13px;font-family:var(--mono)}
  .btn{background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:9px 15px;font-weight:600;cursor:pointer;font-size:13.5px}
  .btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pill{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px}
  .pill.high{background:rgba(232,48,74,.15);color:var(--red)} .pill.mid{background:rgba(255,215,64,.15);color:var(--gold)} .pill.low{background:rgba(0,192,118,.15);color:var(--green)}
  .ai{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px;white-space:pre-wrap;font-size:14px;line-height:1.65;color:var(--text)}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .modal-bg{position:fixed;inset:0;background:rgba(8,10,16,.7);display:none;place-items:center;z-index:60}
  .modal-bg.show{display:grid}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:26px;width:440px;max-width:92vw}
  .modal label{display:block;font-size:12px;color:var(--text2);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .modal input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px;color:var(--text);font-size:14px}
  .back{color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:12px;display:inline-block}
</style>
</head>
<body>
<div id="onboarding"></div>

<div class="nav" id="nav" style="display:none">
  <div class="brand"><span class="dot">◉</span> CustomerPulse <small id="bizlabel"></small></div>
  <div class="navtabs">
    <div class="t active" data-view="dashboard">Dashboard</div>
    <div class="t" data-view="analyze">Add / Analyze</div>
  </div>
  <div class="navr">
    <span class="chip" id="verticalChip"></span>
    <span class="chip" onclick="openSettings()">⚙ Settings</span>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label>Your name (CSM / analyst)</label>
    <input id="setCsm" placeholder="e.g. Priya N.">
    <label>Gemini API key (stored only in this browser)</label>
    <input id="setKey" type="password" placeholder="AI…">
    <label>Change industry / business</label>
    <button class="btn" style="margin-top:6px" onclick="reOnboard()">Re-run onboarding ↻</button>
    <div style="display:flex;gap:10px;margin-top:22px">
      <button class="btn p" style="flex:1" onclick="saveSettings()">Save</button>
      <button class="btn" onclick="closeSettings()">Close</button>
    </div>
  </div>
</div>

<script>
/* ============ VERTICAL CONFIGS (the only thing that swaps) ============ */
const VERTICALS = {
  "b2b-saas": {
    label:"B2B SaaS", icon:"☁", desc:"Customer Success", placeholder:"e.g. Northwind Software",
    entity:"Account", entities:"Accounts", owner:"CSM", currency:"USD",
    labels:{ recurring_value:"ARR", primary_spend:"Lifetime Value", pending:"Outstanding Balance",
      refunds:"Refunds / Credits", promo_value:"Credits", net_value:"Net Revenue", avg_unit:"Avg Deal Size",
      sessions_30d:"Logins (30d)", units_used:"Active Seats", renewal_date:"Renewal Date",
      risk_level:"Churn Risk", health_score:"Health Score", segment:"Segment", nps:"NPS" },
    kpis:["net_value","recurring_value","health_score","renewal_date"],
    tagColors:{Champion:"#00c076",Expansion:"#4f8dff","At-Risk":"#e8304a","Renewal Due":"#ffd740",Onboarding:"#b47fff",Steady:"#8fa8cc",Watch:"#00e5ff"},
    kb:{ role:"You are a senior B2B SaaS Customer Success analyst.",
      guidance:"Classify the account (Champion / Expansion-ready / Steady / At-Risk / Churn-Risk / Onboarding). Flag churn signals: declining logins, low seat adoption vs purchased, rising/unresolved tickets, failed or late payments, sponsor departure, renewal approaching. Two+ co-occurring = material churn risk → recommend a save play, not an upsell. NRR>100% = healthy expansion. Seat utilisation is the strongest adoption signal." } },
  "igaming": {
    label:"iGaming", icon:"🎰", desc:"Player / VIP", placeholder:"e.g. BetAndPlay",
    entity:"Player", entities:"Players", owner:"VIP Manager", currency:"EUR",
    labels:{ recurring_value:"Monthly Deposits", primary_spend:"Total Deposits", pending:"Pending Cashouts",
      refunds:"Chargebacks", promo_value:"Bonuses", net_value:"GGR", avg_unit:"Avg Bet",
      sessions_30d:"Sessions (30d)", units_used:"Active Days", renewal_date:"Next Review",
      risk_level:"Risk Level", health_score:"Value Score", segment:"Segment", nps:"Sentiment" },
    kpis:["net_value","primary_spend","health_score","risk_level"],
    tagColors:{VIP:"#ffd740","Bonus Hunter":"#e8304a","High Roller":"#00c076",Chaser:"#ff8fa3","At Risk":"#4f8dff",Watch:"#ffb347","Re-activation":"#00e5ff","New Player":"#b47fff"},
    kb:{ role:"You are a senior iGaming VIP / player-value analyst with responsible-gambling awareness.",
      guidance:"Assess playing style, value tier, and mood. Flag: bonus abuse (bonus ratio high, no net deposits), chasing losses (rapid stake escalation after losses), RG risk (long sessions, deposit velocity, loss chasing). High GGR + healthy pattern = nurture VIP. Recommend an action: VIP outreach, bonus offer/deny, RG check-in, or re-activation. Never encourage increased play for at-risk patterns." } },
  "retail": {
    label:"Retail / E-com", icon:"🛍", desc:"Shopper CRM", placeholder:"e.g. Harbor Goods",
    entity:"Customer", entities:"Customers", owner:"Account Manager", currency:"USD",
    labels:{ recurring_value:"Avg Monthly Spend", primary_spend:"Lifetime Spend", pending:"Open Returns Value",
      refunds:"Refunds", promo_value:"Loyalty / Discounts", net_value:"Net Revenue", avg_unit:"Avg Order Value",
      sessions_30d:"Visits (30d)", units_used:"Orders (90d)", renewal_date:"Next Best Contact",
      risk_level:"Churn Risk", health_score:"Loyalty Score", segment:"Segment", nps:"NPS" },
    kpis:["primary_spend","recurring_value","health_score","risk_level"],
    tagColors:{VIP:"#ffd740",Loyal:"#00c076","At-Risk":"#e8304a","Win-back":"#00e5ff",New:"#b47fff","Discount-led":"#ff8fa3",Watch:"#ffb347"},
    kb:{ role:"You are a senior retail / e-commerce CRM and lifecycle analyst.",
      guidance:"Segment by RFM (recency, frequency, monetary). Flag: lapsing (no recent orders vs cadence), discount-dependence (high promo share of spend), high return rate eroding net revenue. High LTV + recent + frequent = VIP nurture. Recommend: win-back offer, loyalty upgrade, replenishment nudge, or VIP treatment." } }
};

/* ============ CANONICAL FIELD GROUPS ============ */
const MONEY_KEYS=["recurring_value","primary_spend","net_value","avg_unit","promo_value","refunds","pending"];
const ACTIVITY_KEYS=["sessions_30d","units_used","renewal_date"];
const RISK_KEYS=["health_score","risk_level","segment","nps"];

/* ============ STATE ============ */
const SB_URL="https://sufuqnqmcvdrxnbfmpwh.supabase.co";
const SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1ZnVxbnFtY3ZkcnhuYmZtcHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODYyNDcsImV4cCI6MjA5Njc2MjI0N30.QcCeSrYA0AD8tSslC3XjiLfRp-dkr_-DSBsDArTAz4E";
let SETUP=JSON.parse(localStorage.getItem("cp_setup")||"null"); // {vertical, business}
let CSM=localStorage.getItem("cp_csm")||"";
let GKEY=localStorage.getItem("cp_gemini_key")||"";
let CUSTOMERS=[];        // canonical customer objects
let CURRENT=null;
let obSel=null;

const $=s=>document.querySelector(s);
function V(){ return VERTICALS[SETUP.vertical]; }
function label(k){ return V().labels[k]||k; }
function fmtMoney(v){ return v==null?"—":String(v); }

/* ============ ONBOARDING ============ */
function renderOnboarding(){
  const opts=Object.entries(VERTICALS).map(([id,v])=>
    `<div class="vopt" data-id="${id}" onclick="selVertical('${id}')">
      <div class="ic">${v.icon}</div><div class="nm">${v.label}</div><div class="ds">${v.desc}</div></div>`).join("");
  $("#onboarding").innerHTML=`<div class="overlay"><div class="ob">
    <h1>Welcome to CustomerPulse</h1>
    <p>One customer-intelligence core, tuned to your world. Pick your industry and name your business — every label, metric and the AI brain adapt to match.</p>
    <label>Industry</label><div class="verticals">${opts}</div>
    <label>Business name</label><input id="obBiz" placeholder="Your business" oninput="obCheck()">
    <button class="go" id="obGo" disabled onclick="finishOnboarding()">Launch workspace →</button>
  </div></div>`;
  $("#onboarding").style.display="block";
}
function selVertical(id){ obSel=id; document.querySelectorAll(".vopt").forEach(e=>e.classList.toggle("sel",e.dataset.id===id));
  const b=$("#obBiz"); if(!b.value) b.placeholder=VERTICALS[id].placeholder; obCheck(); }
function obCheck(){ $("#obGo").disabled=!(obSel && $("#obBiz").value.trim()); }
function finishOnboarding(){
  SETUP={vertical:obSel,business:$("#obBiz").value.trim()};
  localStorage.setItem("cp_setup",JSON.stringify(SETUP));
  $("#onboarding").style.display="none";
  boot();
}
function reOnboard(){ closeSettings(); obSel=null; renderOnboarding(); }

/* ============ INGESTION ============ */
function loadFromParam(){
  const p=new URLSearchParams(location.search).get("customer");
  if(!p) return null;
  try{ const d=JSON.parse(decodeURIComponent(escape(atob(p)))); return normalize(d); }catch(e){ return null; }
}
// accept either canonical {entity,money,activity,risk,tags,transactions} or flat
function normalize(d){
  if(d.entity||d.money) return {
    entity:d.entity||{}, money:d.money||{}, activity:d.activity||{}, risk:d.risk||{},
    tags:d.tags||[], transactions:d.transactions||[] };
  return d;
}
function demoData(){
  const v=SETUP.vertical;
  const mk=(name,id,money,act,risk,tags,tx)=>({entity:{name,entity_id:id,owner:CSM||V().owner},money,activity:act,risk,tags,transactions:tx});
  if(v==="b2b-saas") return [
    mk("Northwind Software","ACC-3001",{recurring_value:"$96,000",primary_spend:"$310,000",net_value:"$94,200",avg_unit:"$32,000",promo_value:"$1,200",refunds:"$1,800",pending:"$0"},{sessions_30d:"180",units_used:"140 / 160",renewal_date:"2026-10-31"},{health_score:"84 / 100",risk_level:"Low",segment:"Enterprise",nps:"9"},["Champion","Expansion"],[["2026-06-01","$8,000","Subscription","Paid"],["2026-05-01","$8,000","Subscription","Paid"]]),
    mk("Contoso Retailing","ACC-3002",{recurring_value:"$42,000",primary_spend:"$70,000",net_value:"$38,400",avg_unit:"$21,000",promo_value:"$2,400",refunds:"$3,600",pending:"$3,500"},{sessions_30d:"12",units_used:"9 / 40",renewal_date:"2026-07-20"},{health_score:"41 / 100",risk_level:"High",segment:"Growth",nps:"4"},["At-Risk","Renewal Due"],[["2026-06-01","$3,500","Subscription","Failed"],["2026-05-01","$3,500","Subscription","Paid"]]),
    mk("Fabrikam Inc","ACC-3003",{recurring_value:"$60,000",primary_spend:"$150,000",net_value:"$59,000",avg_unit:"$30,000",promo_value:"$0",refunds:"$1,000",pending:"$0"},{sessions_30d:"95",units_used:"55 / 70",renewal_date:"2026-12-01"},{health_score:"72 / 100",risk_level:"Medium",segment:"Growth",nps:"6"},["Steady"],[["2026-06-01","$5,000","Subscription","Paid"]]) ];
  if(v==="igaming") return [
    mk("Player #10192","PL-10192",{recurring_value:"€4,200",primary_spend:"€38,500",net_value:"€12,300",avg_unit:"€6.40",promo_value:"€2,100",refunds:"€0",pending:"€850"},{sessions_30d:"64",units_used:"22",renewal_date:"2026-07-10"},{health_score:"78 / 100",risk_level:"Medium",segment:"VIP",nps:"Positive"},["VIP","High Roller"],[["2026-06-28","€500","Deposit","Approved"],["2026-06-25","€300","Cashout","Pending"]]),
    mk("Player #10488","PL-10488",{recurring_value:"€120",primary_spend:"€600",net_value:"-€40",avg_unit:"€1.10",promo_value:"€480",refunds:"€0",pending:"€0"},{sessions_30d:"41",units_used:"12",renewal_date:"2026-07-05"},{health_score:"32 / 100",risk_level:"High",segment:"Growth",nps:"—"},["Bonus Hunter","At Risk"],[["2026-06-27","€20","Deposit","Approved"],["2026-06-27","€480","Bonus","Issued"]]),
    mk("Player #10560","PL-10560",{recurring_value:"€2,800",primary_spend:"€21,000",net_value:"€7,900",avg_unit:"€4.20",promo_value:"€900",refunds:"€0",pending:"€0"},{sessions_30d:"38",units_used:"18",renewal_date:"2026-08-01"},{health_score:"69 / 100",risk_level:"Medium",segment:"High Roller",nps:"Neutral"},["Chaser","Watch"],[["2026-06-26","€250","Deposit","Approved"]]) ];
  return [ /* retail */
    mk("Jordan Ellis","CU-5001",{recurring_value:"$310",primary_spend:"$6,400",net_value:"$5,900",avg_unit:"$92",promo_value:"$180",refunds:"$500",pending:"$0"},{sessions_30d:"9",units_used:"14",renewal_date:"2026-07-12"},{health_score:"88 / 100",risk_level:"Low",segment:"VIP",nps:"10"},["VIP","Loyal"],[["2026-06-20","$140","Order","Fulfilled"],["2026-06-02","$88","Order","Fulfilled"]]),
    mk("Sam Rivera","CU-5002",{recurring_value:"$40",primary_spend:"$820",net_value:"$620",avg_unit:"$41",promo_value:"$260",refunds:"$200",pending:"$60"},{sessions_30d:"1",units_used:"1",renewal_date:"2026-07-01"},{health_score:"38 / 100",risk_level:"High",segment:"Lapsing",nps:"5"},["At-Risk","Discount-led"],[["2026-04-10","$41","Order","Fulfilled"]]),
    mk("Taylor Brooks","CU-5003",{recurring_value:"$120",primary_spend:"$2,100",net_value:"$1,980",avg_unit:"$60",promo_value:"$90",refunds:"$0",pending:"$0"},{sessions_30d:"5",units_used:"6",renewal_date:"2026-08-15"},{health_score:"66 / 100",risk_level:"Medium",segment:"Regular",nps:"7"},["Loyal","Watch"],[["2026-06-15","$60","Order","Fulfilled"]]) ];
}

/* ============ VIEWS ============ */
function riskCls(r){ r=(r||"").toLowerCase(); return r.includes("high")?"high":(r.includes("med")||r.includes("mid"))?"mid":"low"; }
function tagColor(t){ return V().tagColors[t]||"#8fa8cc"; }
function tagHTML(tags){ return `<div class="tags">${(tags||[]).map(t=>`<span class="tag" style="background:${tagColor(t)}22;color:${tagColor(t)}">${t}</span>`).join("")}</div>`; }

function showView(name){
  document.querySelectorAll(".navtabs .t").forEach(t=>t.classList.toggle("active",t.dataset.view===name));
  if(name==="dashboard") renderDashboard(); else renderAnalyze();
}
function renderDashboard(){
  const v=V();
  const cards=CUSTOMERS.map((c,i)=>{
    const key=v.kpis[0]; const val=c.money[key]??c.risk[key]??c.activity[key]??"—";
    return `<div class="ccard" onclick="openCustomer(${i})">
      <div class="row"><div><div class="cn">${c.entity.name}</div><div class="ci">${c.entity.entity_id||""}</div></div>
      <span class="pill ${riskCls(c.risk.risk_level)}">${c.risk.risk_level||"—"}</span></div>
      <div class="cl">${label(key)}</div><div class="cm">${val}</div>
      ${tagHTML(c.tags)}</div>`;
  }).join("");
  $("#app").innerHTML=`<div class="section-card"><div class="row">
    <div><h2>${v.entities}</h2><div class="sub">${CUSTOMERS.length} ${v.entities.toLowerCase()} · ${SETUP.business}</div></div>
    <button class="btn p" onclick="showView('analyze')">+ Add ${v.entity}</button></div>
    ${CUSTOMERS.length?`<div class="grid">${cards}</div>`:`<div class="empty">No ${v.entities.toLowerCase()} yet. Use the browser plugin's “Open in CustomerPulse”, or load demo data from Add / Analyze.</div>`}
  </div>`;
}
function renderAnalyze(){
  const v=V();
  $("#app").innerHTML=`<div class="section-card">
    <h2>Add / Analyze a ${v.entity}</h2>
    <div class="sub" style="margin:6px 0 16px">Bring data in via the browser plugin (canonical handoff), or explore with demo data.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn p" onclick="loadDemo()">Load demo ${v.entities.toLowerCase()}</button>
      <button class="btn" onclick="showView('dashboard')">← Back to dashboard</button>
    </div>
    <div style="margin-top:20px;color:var(--text2);font-size:13.5px;line-height:1.7">
      <b>Plugin handoff:</b> the CustomerPulse browser plugin scrapes any back-office / CRM page into the canonical schema and opens
      <span class="mono">…/?customer=&lt;encoded&gt;</span> — this app decodes it and relabels every field as <b>${v.label}</b>.
    </div>
  </div>`;
}
function openCustomer(i){ CURRENT=CUSTOMERS[i]; renderProfile(); }
function kvRows(keys,obj){ return keys.filter(k=>obj[k]!=null).map(k=>{
  let val=obj[k]; if(k==="risk_level") val=`<span class="pill ${riskCls(val)}">${val}</span>`;
  return `<tr><th>${label(k)}</th><td>${val}</td></tr>`; }).join(""); }
function renderProfile(){
  const c=CURRENT, v=V();
  const kpi=(k)=>{ const val=c.money[k]??c.risk[k]??c.activity[k]??"—"; return `<div class="kpi"><div class="l">${label(k)}</div><div class="v">${val}</div></div>`; };
  const tx=c.transactions&&c.transactions.length?`<div class="section-card"><h2>Transactions</h2>
    <table class="tx"><thead><tr><th>Date</th><th>Amount</th><th>Type</th><th>Status</th></tr></thead><tbody>
    ${c.transactions.map(t=>`<tr><td>${t[0]}</td><td>${t[1]}</td><td>${t[2]}</td><td>${t[3]||""}</td></tr>`).join("")}</tbody></table></div>`:"";
  $("#app").innerHTML=`
    <span class="back" onclick="showView('dashboard')">← ${v.entities}</span>
    <div class="section-card"><div class="row">
      <div><h2>${c.entity.name}</h2><div class="sub mono">${c.entity.entity_id||""} · ${v.owner}: ${c.entity.owner||CSM||"—"}</div></div>
      <span class="pill ${riskCls(c.risk.risk_level)}">${label("risk_level")}: ${c.risk.risk_level||"—"}</span></div>
      ${tagHTML(c.tags)}
      <div class="kpis">${v.kpis.map(kpi).join("")}</div>
    </div>
    <div class="section-card"><div class="kvcols">
      <div><h2 style="font-size:15px;margin-bottom:8px">Value</h2><table class="kv">${kvRows(MONEY_KEYS,c.money)}</table></div>
      <div><h2 style="font-size:15px;margin-bottom:8px">Activity &amp; Risk</h2><table class="kv">${kvRows(ACTIVITY_KEYS,c.activity)+kvRows(RISK_KEYS,c.risk)}</table></div>
    </div></div>
    ${tx}
    <div class="section-card"><div class="row"><h2>AI review</h2>
      <button class="btn p" id="aiBtn" onclick="runAI()">Generate ${v.label} brief</button></div>
      <div class="ai" id="aiOut" style="display:none"></div>
    </div>`;
}

/* ============ AI (Gemini, KB swaps per vertical) ============ */
async function runAI(){
  const c=CURRENT, v=V(), out=$("#aiOut"), btn=$("#aiBtn");
  out.style.display="block";
  if(!GKEY){ out.textContent="Add your Gemini API key in ⚙ Settings to generate an AI review."; return; }
  btn.disabled=true; out.textContent="Analysing…";
  const facts=`${v.entity}: ${c.entity.name} (${c.entity.entity_id||""})
Value: ${JSON.stringify(c.money)}
Activity: ${JSON.stringify(c.activity)}
Risk: ${JSON.stringify(c.risk)}
Tags: ${(c.tags||[]).join(", ")}
Recent transactions: ${JSON.stringify(c.transactions||[])}`;
  const prompt=`${v.kb.role}\n${v.kb.guidance}\n\nHere is one ${v.entity.toLowerCase()} from ${SETUP.business} (${v.label}). Field names use ${v.label} terminology. Write a concise 3-4 sentence brief for the ${v.owner}: read the pattern between the numbers, name the archetype, flag any risk, and recommend one specific next action. Do not restate the raw numbers.\n\n${facts}`;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GKEY}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.4,maxOutputTokens:400}})});
    const j=await r.json();
    out.textContent=j?.candidates?.[0]?.content?.parts?.[0]?.text || ("No response. "+(j?.error?.message||""));
  }catch(e){ out.textContent="Error: "+e.message; }
  btn.disabled=false;
}

/* ============ SETTINGS ============ */
function openSettings(){ $("#setCsm").value=CSM; $("#setKey").value=GKEY; $("#settingsModal").classList.add("show"); }
function closeSettings(){ $("#settingsModal").classList.remove("show"); }
function saveSettings(){ CSM=$("#setCsm").value.trim(); GKEY=$("#setKey").value.trim();
  localStorage.setItem("cp_csm",CSM); localStorage.setItem("cp_gemini_key",GKEY); closeSettings(); }
function loadDemo(){ CUSTOMERS=demoData(); showView("dashboard"); }

/* ============ BOOT ============ */
function boot(){
  const v=V();
  $("#nav").style.display="flex"; $("#app").style.display="block";
  $("#bizlabel").textContent="· "+SETUP.business;
  $("#verticalChip").textContent=v.icon+" "+v.label;
  document.querySelectorAll(".navtabs .t").forEach(t=>t.onclick=()=>showView(t.dataset.view));
  const fromPlugin=loadFromParam();
  if(fromPlugin){ CUSTOMERS=[fromPlugin]; CURRENT=fromPlugin; renderProfile(); }
  else { CUSTOMERS=[]; showView("dashboard"); }
}
if(SETUP && VERTICALS[SETUP.vertical]) boot(); else renderOnboarding();
</script>
